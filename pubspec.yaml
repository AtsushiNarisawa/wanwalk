name: wanwalk
description: 愛犬の散歩ルート共有モバイルアプリ - WanWalk
publish_to: 'none'
version: 1.1.2+40

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Supabase
  supabase_flutter: ^2.5.0

  # ソーシャルログイン
  sign_in_with_apple: ^6.1.0
  google_sign_in: ^6.2.1
  crypto: ^3.0.3
  
  # 状態管理 (Riverpod)
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # 地図・GPS
  # A25: v6→v8 メジャー移行（2026-05-31・CEO承認・最新8.x。Dart3.6+要求で環境3.10.1は余裕）
  flutter_map: ^8.0.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0
  location: ^5.0.3
  permission_handler: ^11.0.0
  
  # 画像処理
  image_picker: ^1.0.7
  image: ^4.1.7
  
  # HTTP・ネットワーク
  dio: ^5.4.0
  http: ^1.2.0
  
  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1
  photo_view: ^0.14.0
  tutorial_coach_mark: ^1.3.3
  
  # ユーティリティ
  intl: ^0.18.1
  uuid: ^4.3.0
  path_provider: ^2.1.0
  shared_preferences: ^2.2.0
  collection: ^1.18.0
  in_app_review: ^2.0.0
  logger: ^2.0.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  url_launcher: ^6.2.0
  
  # 環境変数
  flutter_dotenv: ^5.1.0
  
  # 通知（Phase 2で実装済み）
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

  # MVP — Firebase Cloud Messaging（B1 FCM 受信基盤・W3 着手）
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # 2026-05-25 — Firebase Analytics（GA4 連携・wanwalk-web の GA4 プロパティに iOS データストリーム統合）
  firebase_analytics: ^11.6.0

  # MVP — Sentry エラートラッキング（A3 クラッシュゼロ化・W3 着手）
  sentry_flutter: ^8.10.1

  # MVP — Universal Links / Deep Link（A2・W3 着手）
  app_links: ^6.3.2

  # W3 day 18 — アプリ内バージョン表示の動的化（pubspec の version を SSoT 化）
  package_info_plus: ^8.0.0

  # Phase 1 — Phosphor Icons（Wildboundsトーンの統一アイコンセット）
  phosphor_flutter: ^2.1.0

  # Phase 1 — 共有シート（ルート共有ボタン用）
  share_plus: ^10.0.0

  path: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  # A26 テストで GeolocatorPlatform を fake 差し替えするため明示依存
  geolocator_platform_interface: ^4.2.6
  plugin_platform_interface: ^2.1.8
  # A25: ^3→^5 更新（2026-05-31・CEO承認・Dart3.5要求で環境3.10.1は安全マージン大）
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.2

  # W3 day 11 — Sentry Dart obfuscation symbol upload（dSYM は sentry-cli 直接 upload 済）
  sentry_dart_plugin: ^3.3.0

sentry:
  upload_debug_symbols: true
  upload_source_maps: false
  upload_sources: false
  project: flutter
  org: wanwalk
  url: https://sentry.io/
  symbols_path: build/symbols/
  # dart_symbol_map_path は ELF 形式の app.ios-arm64.symbols と非互換（plugin は JSON array を期待）
  # raw Dart symbol が必要な場面は flutter symbolize -i build/symbols/app.ios-arm64.symbols でローカル解読

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/icon/
    - .env

  # Phase 1 — Wildboundsトーン用フォント（DESIGN_TOKENS.md）
  # 可変フォント版TTFを採用。全ウェイト1ファイルで収録（容量最適）。
  # サブセット化は TestFlight ビルド24 提出前に別タスクで実施予定。
  fonts:
    - family: NotoSerifJP
      fonts:
        - asset: assets/fonts/NotoSerifJP-VF.ttf
    - family: NotoSansJP
      fonts:
        - asset: assets/fonts/NotoSansJP-VF.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-VF.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#FF9800"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
